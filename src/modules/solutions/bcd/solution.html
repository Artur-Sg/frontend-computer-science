<section class="solution">
  <header class="solution__header">
    <div class="solution__title">
      <h2>BCD 8421</h2>
      <p>Упаковка числа в BCD.</p>
    </div>
  </header>

  <div class="solution__input">
    <label for="bcd-input" class="label">Число</label>
    <div class="input-row">
      <input id="bcd-input" type="text" value="65536" />
    </div>
    <div class="hint">Только неотрицательные целые. Пример: 65536, 1234567890.</div>
  </div>

  <div class="result-block result-block--equal">
    <div class="result-grid">
      <cs-card title="Нормализация">
        <pre id="bcd-normalized"></pre>
      </cs-card>

      <cs-card title="BCD (байты)">
        <pre id="bcd-bytes"></pre>
      </cs-card>

      <cs-card title="toString / toNumber / toBigint">
        <pre id="bcd-values"></pre>
      </cs-card>

      <cs-card title="Проверка разряда">
        <div class="at-row">
          <div class="hint">Индекс (0 — последняя цифра)</div>
          <label for="bcd-index" class="sr-only">Индекс</label>
          <input id="bcd-index" type="number" value="0" />
        </div>
        <pre id="bcd-at-result"></pre>
      </cs-card>
    </div>
  </div>
</section>
