<section class="solution">
  <header class="solution__header">
    <div class="solution__text">
      <h2>Сравнение схем кодирования</h2>
      <p>Два подхода: наивная фиксированная схема (7 бит) и схема с режимами + заранее заданным префиксным кодом.</p>
    </div>
    <div class="solution__controls">
      <label class="control">
        <input type="radio" name="mode" value="encode" checked />
        Кодирование
      </label>
      <label class="control">
        <input type="radio" name="mode" value="decode" />
        Декодирование
      </label>
    </div>
  </header>

  <div class="solution__input">
    <label for="input" class="label">Ввод</label>
    <textarea id="input" rows="6" placeholder="Введите текст (или битовую строку для режима декодирования)"></textarea>
    <div class="hint">В режиме декодирования используются только символы 0 и 1.</div>
  </div>

  <div class="result-block">
    <div class="result-grid">
      <cs-card id="naive-card" title="Наивная схема" meta="Длина: 0 бит" wrap="soft">
        <pre id="naive-output"></pre>
      </cs-card>

      <cs-card id="smart-card" title="Схема с режимами (префиксный код)" meta="Длина: 0 бит" wrap="soft">
        <pre id="smart-output"></pre>
      </cs-card>
    </div>
  </div>

  <div class="errors-block">
    <div class="label">Ошибки</div>
    <pre id="errors" class="errors"></pre>
  </div>
</section>
