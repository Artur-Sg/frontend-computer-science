<section class="solution">
  <div class="solution__header">
    <div class="solution__title">
      <h2>Интерпретатор байткода</h2>
      <p>Вставьте программу и нажмите «Выполнить»</p>
    </div>
      <cs-button id="run" label="Выполнить" icon="play"></cs-button>
  </div>

  <div class="solution__input">
    <div class="label">Программа (JSON-массив с инструкциями-строками)</div>
    <textarea id="program" rows="14"></textarea>
  </div>

  <div class="solution__output">
    <div class="label">Вывод</div>
    <pre id="output" class="box"></pre>
  </div>
</section>
