<section class="solution">
  <header class="solution__header">
    <div class="solution__title">
      <h2>Циклический сдвиг</h2>
      <p>Проверка работы левого и правого сдвига</p>
    </div>
  </header>

  <div class="solution__input">
    <label for="shift-value" class="label">Число (32 бита)</label>
    <input id="shift-value" type="text" value="0b10000000_00000000_00000000_00000001" />
    <div class="hint">Можно вводить десятичное или двоичное число с префиксом 0b</div>
  </div>

  <div class="solution__input">
    <label for="shift-amount" class="label">Сдвиг</label>
    <input id="shift-amount" type="number" value="16" />
  </div>

  <div class="solution__output">
    <div class="label">Результат</div>
    <div class="result-block">
      <div class="result-grid">
        <cs-card title="Исходное (dec)">
          <pre id="original-dec"></pre>
        </cs-card>
        <cs-card title="Left shift (bin)">
          <pre id="left-bin"></pre>
        </cs-card>
        <cs-card title="Left shift (dec)">
          <pre id="left-dec"></pre>
        </cs-card>
        <cs-card title="Right shift (bin)">
          <pre id="right-bin"></pre>
        </cs-card>
        <cs-card title="Right shift (dec)">
          <pre id="right-dec"></pre>
        </cs-card>
      </div>
    </div>
  </div>
</section>
